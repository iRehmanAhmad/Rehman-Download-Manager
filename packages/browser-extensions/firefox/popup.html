<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RDM</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px; min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif;
      background: #0f172a; color: #e2e8f0; font-size: 13px;
    }
    .header { padding: 14px 16px; border-bottom: 1px solid #1e293b; display: flex; align-items: center; gap: 10px; }
    .header h1 { font-size: 15px; font-weight: 600; color: #f1f5f9; }
    .header .logo { width: 24px; height: 24px; background: #4f46e5; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; }
    .content { padding: 16px; }
    .actions { display: flex; flex-direction: column; gap: 8px; }
    .btn { display: flex; align-items: center; gap: 8px; width: 100%; padding: 10px 12px; border: 1px solid #1e293b; border-radius: 8px; background: #1e293b; color: #cbd5e1; cursor: pointer; font-size: 13px; }
    .btn:hover { background: #334155; border-color: #475569; }
    .btn.primary { background: #4f46e5; border-color: #4f46e5; color: #fff; }
    .btn.primary:hover { background: #4338ca; }
    .status { margin-top: 12px; padding: 8px 10px; background: #1e293b; border-radius: 6px; font-size: 11px; color: #94a3b8; text-align: center; }
    .status.connected { color: #4ade80; }
    .status.disconnected { color: #f87171; }
    .input-row { display: flex; gap: 6px; margin-top: 8px; }
    .input-row input { flex: 1; padding: 8px 10px; border: 1px solid #334155; border-radius: 6px; background: #0f172a; color: #e2e8f0; font-size: 12px; }
    .input-row input:focus { outline: none; border-color: #4f46e5; }
  </style>
</head>
<body>
  <div class="header"><div class="logo">R</div><h1>RDM</h1></div>
  <div class="content">
    <div class="actions">
      <button class="btn primary" id="btn-download-page"><span>📄</span> Download this page</button>
      <button class="btn" id="btn-grab-media"><span>🎬</span> Grab all media</button>
    </div>
    <div class="input-row">
      <input type="text" id="url-input" placeholder="Paste URL to download..." />
      <button class="btn primary" style="width:auto;padding:8px 12px;" id="btn-add-url">Add</button>
    </div>
    <div class="status" id="status">Checking connection...</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
